name: Release container image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag (e.g. dev-latest, 1.0.0)"
        required: true
        default: "dev-latest"
      install_whisper:
        description: "Bundle Whisper (CPU torch ~300MB) — enable for worker"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      install_clip:
        description: "Bundle CLIP (full torch ~2GB) — only if GPU available"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            INSTALL_WHISPER=${{ github.event.inputs.install_whisper }}
            INSTALL_CLIP=${{ github.event.inputs.install_clip }}
          tags: ghcr.io/sriaikyam/aikyam-vision:${{ github.event.inputs.image_tag }}
